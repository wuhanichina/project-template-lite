# Lightweight research trace for route evolution.
# This file is a compact map of decisions, experiments, archived routes, and open questions that affect the paper line.

schema_version: research_template_lite_trace_v1

guide:
  purpose: "记录研究路线如何从初始问题演化到当前主线，并保留有价值的分支和归档路径。"
  provenance_values:
    - user
    - ai-suggested
    - ai-executed
    - user-revised
  node_types:
    - question
    - decision
    - experiment
    - fork_exploration
    - retained_idea
    - archived_route
    - open_question
  fork_exploration_required_fields:
    - base_node
    - hypothesis
    - git_branch
    - changed_files
    - input_difference
    - compared_with
    - result_directory
    - run_manifest
    - observed_difference
    - decision

tree:
  - id: N01
    type: question
    title: "待填：核心科学问题"
    provenance: user
    status: open
    description: "在什么工程场景下，现有方法存在关键不足，而本文方法可以给出更可靠、更可解释或更高效的结果？"
    affects:
      claims:
        - C1
      files:
        - "01_IDEA/story.md"
        - "01_IDEA/claims.md"
    children:
      - id: N02
        type: decision
        title: "待填：选择最小可验证问题"
        provenance: user
        status: open
        choice: "先收窄到一个能被 case33bw / case123 验证的主张。"
        alternatives:
          - "直接写成完整大框架"
          - "先做无边界的工程实现"
        evidence: []
        lesson: "待填：该选择如何帮助论文主张变得可验证。"
      - id: N03
        type: experiment
        title: "待填：case33bw 主算例"
        provenance: ai-executed
        status: open
        verifies:
          - C1
        evidence:
          - E01
        result: "待填：运行后登记关键结果和原始输出路径。"
      - id: N04
        type: experiment
        title: "待填：case123 扩展算例"
        provenance: ai-executed
        status: open
        verifies:
          - C2
        evidence:
          - E02
        result: "待填：运行后登记扩展性、规模和关键指标。"
      - id: N08
        type: fork_exploration
        title: "待填：分叉探索路线"
        provenance: ai-executed
        status: open
        base_node: N02
        hypothesis: "待填：该分叉想验证的建模、求解、参数或对比路线假设。"
        trigger: "待填：为什么需要从当前主线分叉，而不是直接修改主线。"
        git_branch: "【Git 信息待补充】"
        compared_with:
          node: N02
          branch: "【Git 信息待补充】"
          run_manifest: "result/<case>/run_manifest.json"
        changed_files:
          - "待填：关键代码、配置、数据或文档文件"
        input_difference: "待填：相对主线改变了哪些数据、参数、随机种子、solver 或实验条件。"
        expected_signal: "待填：若假设成立，应在哪些指标、图或物理现象中出现差异。"
        result_directory: "result/<case>/"
        run_manifest: "result/<case>/run_manifest.json"
        observed_difference: "待填：与主线相比的实际差异，需引用结果文件、图表或 manifest。"
        decision: "待判断：merge_to_main / retain_as_alternative / archive / rerun_required"
        retained_lesson: "待填：无论是否合并，该分叉对当前研究路线留下的启示。"
        next_action: "待填：合并、补实验、归档或继续比较。"
      - id: N05
        type: retained_idea
        title: "待填：从早期方案保留下来的思路"
        provenance: user-revised
        status: open
        original_context: "待填：该思路最初来自哪个问题或方案。"
        retained_reason: "待填：它为什么仍然服务于当前主线。"
        related_files: []
      - id: N06
        type: archived_route
        title: "待填：已归档的方案"
        provenance: user-revised
        status: archived
        original_hypothesis: "待填：原先认为可行的建模、求解、近似或对比路线。"
        attempt: "待填：尝试方式、分支、commit 或结果目录。"
        observed_issue: "待填：推导、实现或实验中暴露的问题。"
        archived_reason: "待填：暂时不进入当前主线的原因。"
        retained_lesson: "待填：该路线留下的启示。"
      - id: N07
        type: open_question
        title: "待填：尚未验证的问题"
        provenance: user
        status: open
        question: "待填：需要通过推导、代码或实验继续确认的问题。"
        next_step: "待填：下一步行动。"
