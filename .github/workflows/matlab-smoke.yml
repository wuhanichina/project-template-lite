name: MATLAB smoke tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MLM_LICENSE_TOKEN: ${{ secrets.MATLAB_BATCH_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2021a

      - name: Run template contract smoke tests
        uses: matlab-actions/run-command@v3
        with:
          command: addpath(fullfile(pwd,'tests')); run_template_smoke_tests
